<!-- ADD COURSE POPUP -->
<div id="add-pop-up" class="dim-background">
    <div class="pop-up-window">
        <div class="pop-up-header">
            <button class="close-x" onclick="closePopUp()">&times;</button>
        </div>
        <h2>Add New Course</h2>
        <p>Create a new course to manage assignments and track student progress.</p>
        <form id="addCourseForm">
            <div class="input-field">
                <label>Course Code</label>
                <input type="text" name="course_code" placeholder="e.g. CS 101" required>
            </div>
            <div class="input-field">
                <label>Course Name</label>
                <input type="text" name="course_name" placeholder="e.g. Introduction to Computer Science" required>
            </div>
            <div class="input-field">
                <label>Semester</label>
                <select name="semester" required>
                    <option value="">Select semester...</option>
                    <option value="spring-2026">Spring 2026</option>
                    <option value="summer-2026">Summer 2026</option>
                    <option value="fall-2026">Fall 2026</option>
                </select>
            </div>
            <div class="pop-up-actions">
                <button type="button" class="cancel-btn" onclick="closePopUp()">Cancel</button>
                <button type="submit" class="save-btn">Save Changes</button>
            </div>
        </form>
    </div>
</div>
