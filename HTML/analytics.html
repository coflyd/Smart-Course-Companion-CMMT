<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics</title>
        <link rel="stylesheet" href="../CSS/shared.css">
    <link rel="stylesheet" href="../CSS/style-analytics.css">
</head>

<body>
<header id="main-header">
    <div id="top-bar">
        <section id="title-logo">
            <img src="../data/image_1.png" alt="Smart Course Companion logo" id="site-logo">
            <div>
                <h1>THE SMART COURSE COMPANION</h1>
                <small id="app-subtitle">Student Dashboard</small>
            </div>
        </section>
        <section id="profile">
            <img src="../data/person.png" alt="User avatar" id="user-avatar">
            <div id="user-info">
                <span id="user-name">...</span>
                <span id="user-role">Student</span>
            </div>
            <button id="sign-out-btn">Sign Out</button>
        </section>
    </div>
    <nav id="main-nav">
        <ul>
            <li><a href="../HTML/student-ui.html">My Courses</a></li>
            <li><a href="../HTML/upcoming-assignment.html">Upcoming Assignments</a></li>
            <li><a href="../HTML/analytics.html">Analytics</a></li>
        </ul>
    </nav>
</header>
<main>
    <div class="card">
    <div class="card-title">Course Performance</div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-dot student"></div>
            Your grade
        </div>
        <div class="legend-item">
            <div class="legend-dot class-avg"></div>
            Class average
        </div>
    </div>

    <div class="chart-wrapper">

        <div class="y-axis">
            <span>0</span>
            <span>25</span>
            <span>50</span>
            <span>75</span>
            <span>100</span>
        </div>

        <div class="chart-area">

            <div class="grid-lines">
                <div class="grid-line"></div>
                <div class="grid-line"></div>
                <div class="grid-line"></div>
                <div class="grid-line"></div>
                <div class="grid-line"></div>
            </div>

            <div class="bars">
                <div class="bar-group">
                    <div class="bar-pair">
                        <div class="bar bar-student" style="height: 88%;" role="img" aria-label="COMP 233 student: 88"></div>
                        <div class="bar bar-class" style="height: 72%;" role="img" aria-label="COMP 233 class avg: 72"></div>
                    </div>
                </div>
                <div class="bar-group">
                    <div class="bar-pair">
                        <div class="bar bar-student" style="height: 80%;" role="img" aria-label="COMP 249 student: 80"></div>
                        <div class="bar bar-class" style="height: 65%;" role="img" aria-label="COMP 249 class avg: 65"></div>
                    </div>
                </div>
                <div class="bar-group">
                    <div class="bar-pair">
                        <div class="bar bar-student" style="height: 91%;" role="img" aria-label="SOEN 228 student: 91"></div>
                        <div class="bar bar-class" style="height: 78%;" role="img" aria-label="SOEN 228 class avg: 78"></div>
                    </div>
                </div>
                <div class="bar-group">
                    <div class="bar-pair">
                        <div class="bar bar-student" style="height: 82%;" role="img" aria-label="SOEN 287 student: 82"></div>
                        <div class="bar bar-class" style="height: 70%;" role="img" aria-label="SOEN 287 class avg: 70"></div>
                    </div>
                </div>
            </div>

            <div class="x-labels">
                <div class="x-label">COMP 233</div>
                <div class="x-label">COMP 249</div>
                <div class="x-label">SOEN 228</div>
                <div class="x-label">SOEN 287</div>
            </div>

        </div>
    </div>
</div>
</main>

    <script src="../JavaScript/header.js"></script>
</body>
</html>
