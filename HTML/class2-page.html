<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> COMP 233 </title>
    <link rel="stylesheet" href="style-class2-page.css">
</head>
<body>
<header>
    <img src="233-logo.png" id="logo">
    COMP 233
    <p> Probability & Statistics </p>
    <p> Instructor : Professor Fevens </p>

</header>
<div id="buttons">

    <button id = delete-button popovertarget="delete-popup"> Delete Course </button>

    <section id = "delete-popup" popover>
        <h3>  Delete Course </h3> <br>
        <p>Are you sure you want to delete this course? This action cannot be undone.</p>
        <button class="btn-delete">Delete Course</button>
        <button class="btn-cancel" popovertarget="delete-popup" popovertargetaction="hide">Cancel</button>
    </section>



    <button id="edit-button" popovertarget="edit-popup"> Edit Course </button>
    <br>

    <section id = "edit-popup" popover>
        <h3>  Edit Course </h3> <br>
        <form>
            <label for="class">Class Code</label>
            <input type="text" id="class" name="class" >

            <label for="title"> Class Title</label>
            <input type="text" id="title" name="title">

            <label for="prof">Professor</label>
            <input type="text" id="prof" name="prof">

            <label for="term"> Term </label>
            <input type="text" id="term" name="prof">

            <button id= "bform"  type="submit">Save change </button>
        </form>
    </section>

</div>
<div class="container">

    <section class="card">
        <small> Current Grade </small>

        <h3 class="grade"> 88% </h3>

        <p> Based on 60% of the grade weight </p>
    </section>



    <section class="card">
        <small> Completion </small>
        <h3 class =grade> 58% </h3>

        <!-- COMPLETION BAR-->
        <section class="lab-progress">
            <div class="progress-row">
                <p> Pop Quizz </p>
                <span class="completion"> 7/9 </span>

            </div>

            <progress value="78" max="100"></progress>


            <div class="progress-row">
                <p> Assignments </p>
                <span class="completion"> 3/4 </span>
            </div>

            <progress value="75" max="100"></progress>

            <div class="progress-row">
                <p> Exams </p>
                <span class="completion"> 1/2 </span>
            </div>

            <progress value="50" max="100"></progress>

        </section>

    </section>

</div>
</body>
</html>
