<!DOCTYPE html>
<!--======================================
SMART COURSE COMPANION — courseSettings.html
Auteur : Constance Fleury
========================================-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Course Companion — Course Settings</title>
    <link rel="stylesheet" href="../CSS/InstructorDashboard_StudentProgress.css">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="header-left">
        <div class="brand-logo">
            <img src="../data/image_1.png" alt="SCC Logo">
        </div>
        <div class="brand-text">
            <strong>Smart Course Companion</strong>
            <small>Instructor Dashboard</small>
        </div>
    </div>
    <div class="header-right">
        <button class="signout-btn" onclick="window.location.href='../HTML/registerLogin.html'">
            <span>Sign Out</span>
        </button>
        <div class="header-divider"></div>
        <div class="user-info">
            <div class="userinfo-circle">DR</div>
            <div class="userinfo-text">
                <strong>Dr. Roberts</strong>
                <small>Instructor</small>
            </div>
        </div>
    </div>
</header>

<!-- NAV -->
<nav>
    <div class="nav-tabs">
        <button class="tab-active" onclick="window.location.href='../HTML/InstructorDashboard.html'">My Courses</button>
    </div>
</nav>

<!-- MAIN -->
<main>

    <button class="back-btn" onclick="window.location.href='../HTML/CourseOverview-templateA.html'">← Back to Course</button>

    <div class="course-title-section">
        <h1>CS 101</h1>
        <p class="course-subtitle">Introduction to Computer Science</p>
        <p class="course-subtitle">Spring 2026</p>
    </div>

    <div class="course-tabs">
        <button class="course-tab" onclick="window.location.href='../HTML/CourseOverview-templateA.html'">Overview</button>
        <button class="course-tab" onclick="window.location.href='../HTML/CourseOverview-templateA.html'">Assignments</button>
        <button class="course-tab" onclick="window.location.href='../HTML/CourseOverview-templateA.html'">Student Progress</button>
        <button class="course-tab course-tab-active">Course Settings</button>
    </div>

    <!-- SETTINGS FORM -->
    <div class="settings-card">
        <h3>Course Settings</h3>

        <div class="form-group">
            <label>Course Code</label>
            <input type="text" value="CS 101">
        </div>

        <div class="form-group">
            <label>Course Title</label>
            <input type="text" value="Introduction to Computer Science">
        </div>

        <div class="form-group">
            <label>Semester</label>
            <input type="text" value="Spring 2026">
        </div>

        <div class="form-group">
            <label>Instructor</label>
            <input type="text" value="Dr. Roberts">
        </div>

        <div class="form-group">
            <label>Max Enrollment</label>
            <input type="number" value="120">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea rows="3">Fundamentals of programming, algorithms, and computational thinking.</textarea>
        </div>

        <div class="form-group">
            <label>Course Visibility</label>
            <select class="settings-select" style="margin-bottom:0;">
                <option>Enrolled Students Only</option>
                <option>All University Students</option>
                <option>Public (Anyone with link)</option>
                <option>Instructors Only</option>
            </select>
        </div>

        <button class="save-settings-btn" onclick="showToast('Settings saved!')">Save Settings</button>
    </div>

</main>

<div class="toast" id="toast"></div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '../HTML/registerLogin.html';

    const payload = JSON.parse(atob(token.split('.')[1]));
    const userNameEl = document.querySelector('.userinfo-text strong');
    if (userNameEl) userNameEl.textContent = payload.name;
    const circleEl = document.querySelector('.userinfo-circle');
    if (circleEl) circleEl.textContent = payload.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);

    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const name = params.get('name');

    if (code) document.querySelector('.course-title-section h1').textContent = code.replace(/([A-Za-z]+)(\d+)/, '$1 $2');
    if (name) document.querySelectorAll('.course-title-section p')[0].textContent = decodeURIComponent(name);

    const inputs = document.querySelectorAll('.form-group input');
    if (code) inputs[0].value = code;
    if (name) inputs[1].value = decodeURIComponent(name);

    document.querySelector('.save-settings-btn').addEventListener('click', async () => {
        const title = inputs[1].value;
        const term = inputs[2].value;
        const instructor_name = inputs[3].value;

        try {
            const response = await fetch(`https://smart-course-companion-cmmt-production.up.railway.app/api/courses/${code}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ title, instructor_name, term })
            });
            const data = await response.json();
            if (data.message) showToast('Settings saved!');
            else showToast('Error saving settings');
        } catch (err) {
            console.error(err);
        }
    });

    let toastTimer;
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = '✓ ' + msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
    }
</script>

</body>
</html>
