<!DOCTYPE html>
<!-- SMART STUDENT COMPANION - instructorAssignments.html
 Description: Instructor Interface- Adding and Removing Assignments
 By Thushika Thavarajah (27516126) -->

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Instructor Dashboard Smart</title>
        <link rel="stylesheet" href="../CSS/shared.css">
    <link rel="stylesheet" href="../CSS/styleAssigmentManagement.css">
</head>
<body>

    <!----- Header ----->
    <header id="main-header">
    <div id="top-bar">
        <section id="title-logo">
            <img src="../data/image_1.png" alt="Smart Course Companion logo" id="site-logo">
            <div>
                <h1>THE SMART COURSE COMPANION</h1>
                <small id="app-subtitle">Instructor Dashboard</small>
            </div>
        </section>
        <section id="profile">
            <div id="user-info">
                <span id="user-name">...</span>
                <span id="user-role">Instructor</span>
            </div>
            <button id="sign-out-btn">Sign Out</button>
        </section>
    </div>
    <nav id="inst-nav-bar">
        <a class="inst-nav-link" href="../HTML/InstructorDashboard.html">My Courses</a>
        <a class="inst-nav-link" href="../HTML/CourseOverview-templateA.html">Student Progress</a>
        <a class="inst-nav-link" href="../HTML/analytics.html">Analytics</a>
    </nav>
</header>

    <!----- Per class Container ----->
    <div class="container">
        
        <!--Hard Coded element -->
        <h1>CS 101</h1>
        <p class="course-Name">Introduction to Computer Science
        <br>Spring 2026
        </p>

        <!--Navigation Tabs -->
        <div class="Course-tabs">
            <button class="tab" onclick="window.location.href='../HTML/CourseOverview-templateA.html'">Overview</button>
            <button class="tab-active">Assignments</button>
            <button class="tab" onclick="window.location.href='../HTML/CourseOverview-templateA.html'">Student Progress</button>
            <button class="tab" onclick="window.location.href='../HTML/courseSettings.html'">Course Settings</button>
        </div>

        <!-- Assignment Section -->
        <div class="assignment-box">

            <div class="assignment-header">
                <h3>Assignment Management</h3>
             <div class="total-weight"> 100%
             </div>
               
              <input type="text" id="title" placeholder="Assignment Title">
            <input type="date" id="dueDate">
            <input type="number" id="weight" placeholder="Weight (%)">
            <input type="number" id="points" placeholder="Total Points">
           
            <button id="addAssignmentBtn">Add</button>
         
          </div>
            <!-- Secondary Tabs -->
            <div class="sub-tabs">
                <button class="sub-tabactive">Assignments</button>
                <button class="sub-tab">Upload Grades</button>
            </div>
          <br>
         
            <!-- Table -->
            <table>
                <thead>
                    <tr>
                        <th>Assignment</th>
                        <th>Due Date</th>
                        <th>Weight</th>
                        <th>Points</th>
                        <th>Submissions</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="assignmentTable">
                </tbody>
            </table>

        </div>
    </div>

<script src="../JavaScript/scriptAddAssignment_inst.js"></script>
    <script src="../JavaScript/header.js"></script>
</body>
</html>
