<!DOCTYPE html>
<!-- SMART COURSE COMPANION - instructorAssignments.html
 By Thushika Thavarajah (27516126) -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Dashboard - Assignments</title>
    <link rel="stylesheet" href="../CSS/InstructorDashboard_StudentProgress.css">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="header-left">
        <div class="brand-logo">
            <img src="../data/image_1.png" alt="SCC Logo">
        </div>
        <div class="brand-text">
            <strong>Smart Course Companion</strong>
            <small>Instructor Dashboard</small>
        </div>
    </div>
    <div class="header-right">
        <button class="signout-btn" onclick="window.location.href='../HTML/registerLogin.html'">
            <span>Sign Out</span>
        </button>
        <div class="header-divider"></div>
        <div class="user-info">
            <div class="userinfo-circle">DR</div>
            <div class="userinfo-text">
                <strong>Dr. Roberts</strong>
                <small>Instructor</small>
            </div>
        </div>
    </div>
</header>

<!-- NAV -->
<nav>
    <div class="nav-tabs">
        <button class="tab-active" onclick="window.location.href='../HTML/InstructorDashboard.html'">My Courses</button>
    </div>
</nav>

<!-- MAIN -->
<main>

    <!-- BACK -->
    <button class="back-btn" onclick="window.location.href='../HTML/CourseOverview-templateA.html'">← Back to Course</button>

    <!-- COURSE TITLE -->
    <div class="course-title-section">
        <h1>CS 101</h1>
        <p class="course-subtitle">Introduction to Computer Science</p>
        <p class="course-subtitle">Spring 2026</p>
    </div>

    <!-- COURSE TABS -->
    <div class="course-tabs">
        <button class="course-tab" onclick="window.location.href='../HTML/CourseOverview-templateA.html'">Overview</button>
        <button class="course-tab course-tab-active">Assignments</button>
        <button class="course-tab" onclick="window.location.href='../HTML/CourseOverview-templateA.html'">Student Progress</button>
        <button class="course-tab" onclick="window.location.href='../HTML/courseSettings.html'">Course Settings</button>
    </div>

    <!-- ASSIGNMENT BOX -->
    <div class="assignment-box">
        <h3>Assignment Management</h3>
        <div class="total-weight">100%</div>

        <div class="assignment-inputs">
            <input type="text" id="title" placeholder="Assignment Title">
            <input type="date" id="dueDate">
            <input type="number" id="weight" placeholder="Weight (%)">
            <input type="number" id="points" placeholder="Total Points">
            <button class="add-btn" id="addAssignmentBtn">Add</button>
        </div>

        <!-- SUB TABS -->
        <div class="sub-tabs">
            <button class="sub-tab-active">Assignments</button>
            <button class="sub-tab" onclick="window.location.href='../HTML/instructoruploadgrades.html'">Upload Grades</button>
        </div>

        <!-- TABLE -->
        <table>
            <thead>
                <tr>
                    <th>Assignment</th>
                    <th>Due Date</th>
                    <th>Weight</th>
                    <th>Points</th>
                    <th>Submissions</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="assignmentTable"></tbody>
        </table>
    </div>

</main>

<script src="../JavaScript/scriptAddAssignment_inst.js"></script>
</body>
</html>
