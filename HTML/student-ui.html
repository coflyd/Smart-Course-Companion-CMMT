<!DOCTYPE html>

<!-- SMART STUDENT COMPANION STUDENT INTERFACE (DASHBOARD)
 By Maélys HOUNKPONOU ID : 40323380 -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> THE SMART COURSE COMPANION </title>
        <link rel="stylesheet" href="../CSS/shared.css">
    <link rel="stylesheet" href="../CSS/student-ui.css">
</head>
<body>
<header id="main-header">
    <div id="top-bar">
        <section id="title-logo">
            <img src="../data/image_1.png" alt="Smart Course Companion logo" id="site-logo">
            <div>
                <h1>THE SMART COURSE COMPANION</h1>
                <small id="app-subtitle">Student Dashboard</small>
            </div>
        </section>
        <section id="profile">
            <img src="../data/person.png" alt="User avatar" id="user-avatar">
            <div id="user-info">
                <span id="user-name">...</span>
                <span id="user-role">Student</span>
            </div>
            <button id="sign-out-btn">Sign Out</button>
        </section>
    </div>
    <nav id="main-nav">
        <ul>
            <li><a href="../HTML/student-ui.html">My Courses</a></li>
            <li><a href="../HTML/upcoming-assignment.html">Upcoming Assignments</a></li>
            <li><a href="../HTML/analytics.html">Analytics</a></li>
        </ul>
    </nav>
</header>

  
  <h3>My Courses</h3>
  <button id="add-course-btn">+ Add Course</button>
  <br>

  <section id="add-course-popup" popover>
      <form id="add-course-form">
          <label for="class-code">Class Code</label>
          <input type="text" id="class-code" name="class-code" placeholder="e.g. COMP 249">
          <label for="class-title">Class Title</label>
          <input type="text" id="class-title" name="class-title" placeholder="e.g. Object-Oriented Programming">
          <label for="professor">Professor</label>
          <input type="text" id="professor" name="professor">
          <label for="term">Term</label>
          <input type="text" id="term" name="term" placeholder="e.g. Winter 2026">
          <button type="submit">Add Course</button>
      </form>
  </section>

  <!-- Les cours sont injectés ici par student-ui.js -->
  <div id="courses-grid" id="courses">
      <p id="courses-loading">Loading courses...</p>
  </div>

</body>
</html>
