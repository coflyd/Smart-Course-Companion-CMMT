<main>
<h3>UPCOMING ASSIGNMENTS </h3>


    <button popovertarget="add-course-popup"> + Add Assignment  </button>
<br>

<section id = "add-course-popup" popover>
    <form>
    <label for="class">Class</label>
    <input type="text" id="class" name="class" >

    <label for="title">Assignment Title</label>
    <input type="text" id="title" name="title">

    <label for="duedate">Due Date</label>
    <input type="date" id="duedate" name="duedate">

    <label for="status">Status</label>
    <select id="status" name="status">
        <option value="1">NOT STARTED</option>
        <option value="2">ON GOING</option>
        <option value="3">COMPLETED!</option>
    </select>

    <button class = "bform"  type="submit">Add Assignment</button>
    </form>

</section>
    <div style="overflow-x:auto;">

    <table>

        <tr>

                Class
            </th>

            </th>

            </th>

            <th>
                Status
            </th>

            <th>
                Grade
            </th>

            <th>
                Weight
            </th>

        </tr>
        </thead>
<tbody>
        <tr>
            <td data-cell="class1"> <span class="badge">COMP 249</span> </td>            <td data-cell="title"> Assignment 2 </td>

                <select>

                    <option value="3">  COMPLETED! </option></select>

            <td data-cell="grade"> <input type="number" value="100"> </td>
            <td data-cell="weight"> <input type="number" value="100"> </td>
        </tr>

            <td data-cell="grade"> <input type="number" value="100"> </td>
