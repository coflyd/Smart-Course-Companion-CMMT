<!DOCTYPE html>
<!-- SMART STUDENT COMPANION STUDENT INTERFACE (UPCOMING ASSIGNMENT PAGE)
 By Maélys HOUNKPONOU ID : 40323380 -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SMART COURSE COMPANION</title>
    <link rel="stylesheet" href="../CSS/upcoming-assignment.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&display=swap" rel="stylesheet">
</head>
<body>
<header>
    <div class="header-left">
        <div class="brand-logo">
            <img src="../data/SCC Logo.PNG" alt="SCC Logo"></div>
        <div class="brand-text">
            <strong>Smart Course Companion</strong>
            <small>Student Dashboard</small></div>
    </div>
    <div class="header-right">
        <button class="signout-btn" onclick="window.location.href='registerLogin.html'">
            <img src="../data/SignOut.png" alt="Exit icon">
            <span>Sign Out</span></button>
        <div class="header-divider"></div>
        <div class="user-info">
            <img src="../data/person.png">
            <div class="userinfo-text">
                <strong>Masila Baduza</strong>
                <small>Student</small></div>
        </div>
    </div>
</header>
<nav>
    <div class="nav-tabs">
        <button class="tab" onclick="window.location.href='../HTML/student-ui.html'">My Courses</button>
        <button class="tab-active" onclick="window.location.href='../HTML/upcoming-assignment.html'">Upcoming Assignments</button>
        <button class="tab" onclick="window.location.href='../HTML/analytics.html'">Analytics</button>
    </div>
</nav>

<main>
<h3>UPCOMING ASSIGNMENTS</h3>

    <!-- MODIF: Bouton changé de "Add Assignment" à "Add Grade & Status" -->
    <button popovertarget="add-course-popup"> + Add Grade &amp; Status </button>
<br>

<!-- MODIF: Formulaire modifié - l'étudiant choisit un assignment existant et entre sa note/status uniquement -->
<section id="add-course-popup" popover>
    <form id="grade-form">
        <h3>Add Your Grade &amp; Status</h3>

        <label for="assignment-select">Assignment</label>
        <select id="assignment-select" name="assignment">
            <option value="">Select an assignment...</option>
        </select>

        <label for="earned">Your Grade (earned marks)</label>
        <input type="number" id="earned" name="earned" min="0">

        <label for="status">Status</label>
        <select id="status" name="status">
            <option value="pending">NOT STARTED</option>
            <option value="ongoing">ON GOING</option>
            <option value="completed">COMPLETED!</option>
        </select>

        <button class="bform" type="submit">Save</button>
    </form>
</section>

    <div style="overflow-x:auto;">
    <table>
        <thead>
        <tr>
            <th>Class</th>
            <th>Assignment Title</th>
            <th>Due on :</th>
            <th>Status</th>
            <th>Grade</th>
            <th>Weight</th>
        </tr>
        </thead>
        <!-- Données chargées dynamiquement par upcoming-assignment.js -->
        <tbody></tbody>
    </table>
    </div>
</main>
<script src="../JavaScript/upcoming-assignment.js"></script>
</body>
</html>
